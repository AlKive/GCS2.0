<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Control System - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'gcs-dark': 'var(--bg-main)',
            'gcs-panel': 'var(--bg-panel)',
            'gcs-card': 'var(--bg-card)',
            'gcs-primary': 'var(--neon-primary)',
            'gcs-success': '#10b981',
            'gcs-warning': '#f59e0b',
            'gcs-error': '#ef4444',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          }
        }
      }
    }
    </script>
    <style>
      :root {
        /* Tactical Dark (Cyber Red Neo) */
        --bg-main: #0f111a;
        --bg-panel: #1a1d2d;
        --bg-card: #131521;
        --text-main: #f1f5f9;
        --text-dim: #64748b;
        --neon-primary: #ef4444;
        --neon-glow: rgba(239, 68, 68, 0.8);
        --border-main: rgba(255, 255, 255, 0.05);
      }

      .light {
        /* Beige Architectural (Light) */
        --bg-main: #f5f5dc;
        --bg-panel: #ffffff;
        --bg-card: #f1f1e6;
        --text-main: #1a202c;
        --text-dim: #718096;
        --neon-primary: #f97316;
        --neon-glow: rgba(249, 115, 22, 0.4);
        --border-main: rgba(0, 0, 0, 0.08);
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .text-main { color: var(--text-main); }
      .text-dim { color: var(--text-dim); }
      .border-main { border-color: var(--border-main); }
      .bg-main { background-color: var(--bg-main); }
      .bg-panel { background-color: var(--bg-panel); }
      .bg-card-inner { background-color: var(--bg-card); }

      .neon-glow {
        filter: drop-shadow(0 0 8px var(--neon-glow));
      }
      .neon-border {
        border-color: var(--neon-primary);
        box-shadow: 0 0 10px var(--neon-glow);
      }
      .hud-grid {
        background-image: 
          linear-gradient(var(--border-main) 1px, transparent 1px),
          linear-gradient(90deg, var(--border-main) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--text-dim); opacity: 0.2; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--neon-primary); }
    </style>  </head>
  <body class="bg-gcs-background font-sans dark:bg-gcs-dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
